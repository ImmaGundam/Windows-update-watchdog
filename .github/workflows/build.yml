name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-versionfile
          pip install -r docs/requirements.txt

      - name: Generate version info
        shell: python
        run: |
          import pyinstaller_versionfile
          pyinstaller_versionfile.create_versionfile(
              output_file="version_info.txt",
              version="1.2.1.0",
              company_name="James Deitz",
              file_description="Windows System Admin tool that manages Windows Update & Defender services.",
              internal_name="WindowsUpdateWatchdog",
              legal_copyright="© James Deitz",
              original_filename="WindowsUpdateWatchdog.exe",
              product_name="Windows Update Watchdog",
          )

      - name: Build executable
        shell: bash
        run: |
          pyinstaller \
            --name "WindowsUpdateWatchdog" \
            --windowed \
            --onefile \
            --icon "assets/icon.ico" \
            --version-file "version_info.txt" \
            --add-data "ui;ui" \
            --add-data "assets;assets" \
            --collect-all pywebview \
            --hidden-import "pystray._win32" \
            --hidden-import "PIL.Image" \
            main.pyw

      - name: Smoke-test binary exists
        run: Test-Path dist\WindowsUpdateWatchdog.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsUpdateWatchdog-${{ github.ref_name }}
          path: dist/WindowsUpdateWatchdog.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WindowsUpdateWatchdog.exe
          generate_release_notes: true
